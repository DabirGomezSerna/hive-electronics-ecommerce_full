name: CI — Hive Electronics Ecommerce

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Stop in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend unit tests (fast, no DB)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend — Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hive-electronics-ecommerce_api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hive-electronics-ecommerce_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Backend integration tests (MongoMemoryServer)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend — Integration tests
    runs-on: ubuntu-latest
    needs: backend-unit
    defaults:
      run:
        working-directory: hive-electronics-ecommerce_api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hive-electronics-ecommerce_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: hive-electronics-ecommerce_api/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Frontend unit tests (Vitest + jsdom)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-unit:
    name: Frontend — Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hive-electronics-ecommerce_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hive-electronics-ecommerce_app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit

      - name: Generate coverage report
        run: npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: hive-electronics-ecommerce_app/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Frontend build (verify production build does not break)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: frontend-unit
    defaults:
      run:
        working-directory: hive-electronics-ecommerce_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hive-electronics-ecommerce_app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          CI: false  # CRA treats warnings as errors when CI=true; disable to avoid build failures on non-critical warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Cypress E2E tests (requires CRA dev server)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E — Cypress
    runs-on: ubuntu-latest
    needs: [backend-integration, frontend-build]
    defaults:
      run:
        working-directory: hive-electronics-ecommerce_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hive-electronics-ecommerce_app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start CRA dev server (background)
        run: npm start &
        env:
          CI: false
          BROWSER: none  # Prevents CRA from opening a browser tab

      - name: Wait for dev server to be ready
        run: npx wait-on http://localhost:3000 --timeout 90000

      - name: Run Cypress tests (headless)
        run: npm run test:e2e
        env:
          CYPRESS_baseUrl: http://localhost:3000

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: hive-electronics-ecommerce_app/cypress/screenshots/
          retention-days: 7
